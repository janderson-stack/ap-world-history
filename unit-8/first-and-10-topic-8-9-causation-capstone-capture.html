<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>First & 10 Capture Wrapper | Topic 8.9</title>
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #1A1C1D; overflow: hidden; }
    iframe { width: 100%; height: 100vh; border: 0; display: block; }
  </style>
</head>
<body>
  <iframe id="first10-frame" src="first-and-10-topic-8-9-causation-capstone.html?v=20260610" title="First and 10 Topic 8.9"></iframe>
  <script>
    const PREFILLED_FIRST10_FORM = 'https://docs.google.com/forms/d/e/1FAIpQLSe_0wBPNvSivuE0ea3fhty43c4PDNfE-tEWsGsZYyh0gFCxxw/viewform?usp=pp_url&entry.125385659=Unit+8+-+Cold+War+and+Decolonization&entry.187055090=8.9+-+Causation+in+the+Cold+War+and+Decolonization&entry.1549761827=8.9-first10&entry.2107637366=First+and+10&entry.1963461515=Causation&entry.1963461515=Comparison&entry.1963461515=Argumentation';
    const MAGICSCHOOL_URL = 'https://student.magicschool.ai/s/login?joinCode=czwb9Q';

    function wireFirst10Capture() {
      const frame = document.getElementById('first10-frame');
      if (!frame) return;
      frame.addEventListener('load', function () {
        try {
          const doc = frame.contentDocument || frame.contentWindow.document;

          const submitBtns = doc.querySelectorAll('.btn-submit-google, [data-action="submit-google"]');
          submitBtns.forEach(function (btn) {
            btn.addEventListener('click', function (e) {
              e.preventDefault();
              const responseText = (doc.getElementById('google-output') || {}).value || '';
              const url = PREFILLED_FIRST10_FORM + (responseText ? '&entry.1845180246=' + encodeURIComponent(responseText) : '');
              window.open(url, '_blank', 'noopener');
            });
          });

          const msBtns = doc.querySelectorAll('.btn-magicschool, [data-action="open-magicschool"]');
          msBtns.forEach(function (btn) {
            btn.addEventListener('click', function (e) {
              e.preventDefault();
              window.open(MAGICSCHOOL_URL, '_blank', 'noopener');
            });
          });

          const allBtns = doc.querySelectorAll('button, a.btn');
          allBtns.forEach(function (btn) {
            const text = (btn.textContent || '').toLowerCase().trim();
            if (text.includes('submit to google') || text.includes('submit to form')) {
              btn.addEventListener('click', function (e) {
                e.preventDefault();
                const responseText = (doc.getElementById('google-output') || {}).value || '';
                const url = PREFILLED_FIRST10_FORM + (responseText ? '&entry.1845180246=' + encodeURIComponent(responseText) : '');
                window.open(url, '_blank', 'noopener');
              });
            }
            if (text.includes('open magicschool') || text.includes('magicschool')) {
              btn.addEventListener('click', function (e) {
                e.preventDefault();
                window.open(MAGICSCHOOL_URL, '_blank', 'noopener');
              });
            }
          });

        } catch (err) {
          // Cross-origin guard — no action needed
        }
      });
    }

    wireFirst10Capture();
  </script>
</body>
</html>
