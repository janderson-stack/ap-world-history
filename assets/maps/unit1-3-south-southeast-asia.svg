<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
<title id="title">South and Southeast Asia, c. 1200 to c. 1450</title>
<desc id="desc">Instructional locator map showing South Asia, mainland Southeast Asia, island Southeast Asia, monsoon routes, and major states.</desc>
<rect width="1200" height="720" fill="#f5f0e7"/>
<rect x="45" y="45" width="1110" height="630" rx="18" fill="#fffdf7" stroke="#5a5f5c" stroke-width="3"/>
<text x="600" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="34" font-weight="700" fill="#1a1c1d">South &amp; Southeast Asia, c. 1200–1450</text>
<text x="600" y="124" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5a5f5c">Land-based states, maritime states, Hinduism, Buddhism, Islam, and Indian Ocean trade</text>
<path d="M250 190 L415 245 L470 390 L420 555 L300 500 L230 330 Z" fill="#d2b48c" stroke="#8c5a2b" stroke-width="3"/>
<path d="M500 250 L645 275 L705 370 L665 465 L535 455 L475 350 Z" fill="#c9a46a" stroke="#8c5a2b" stroke-width="3"/>
<path d="M720 415 C790 400 845 420 880 455 C825 482 760 470 720 415 Z" fill="#a8652d" opacity="0.75" stroke="#6b3e1f" stroke-width="2"/>
<path d="M860 510 C950 490 1010 520 1075 560" fill="none" stroke="#6b3e1f" stroke-width="8" stroke-linecap="round" opacity="0.55"/>
<path d="M130 560 C300 515 475 520 650 565 C830 610 970 600 1100 545" fill="none" stroke="#3e4447" stroke-width="5" stroke-dasharray="14 12" opacity="0.7"/>
<circle cx="345" cy="330" r="10" fill="#1a1c1d"/><text x="345" y="310" text-anchor="middle" font-family="Arial" font-size="20" font-weight="700">Delhi Sultanate</text>
<circle cx="385" cy="470" r="10" fill="#1a1c1d"/><text x="385" y="495" text-anchor="middle" font-family="Arial" font-size="20" font-weight="700">Vijayanagara</text>
<circle cx="595" cy="360" r="10" fill="#1a1c1d"/><text x="595" y="340" text-anchor="middle" font-family="Arial" font-size="20" font-weight="700">Khmer</text>
<circle cx="785" cy="455" r="10" fill="#1a1c1d"/><text x="785" y="435" text-anchor="middle" font-family="Arial" font-size="20" font-weight="700">Srivijaya</text>
<text x="305" y="590" text-anchor="middle" font-family="Arial" font-size="22" font-weight="700" fill="#6b3e1f">South Asia</text>
<text x="625" y="530" text-anchor="middle" font-family="Arial" font-size="22" font-weight="700" fill="#6b3e1f">Mainland Southeast Asia</text>
<text x="915" y="610" text-anchor="middle" font-family="Arial" font-size="22" font-weight="700" fill="#6b3e1f">Island Southeast Asia</text>
<g transform="translate(84 594)"><rect width="390" height="48" rx="8" fill="#1a1c1d"/><text x="18" y="31" font-family="Arial" font-size="18" fill="#f5f0e7">Dashed route = Indian Ocean / monsoon trade</text></g>
</svg>