<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
<title id="title">State Building in the Americas, c. 1200 to c. 1450</title>
<desc id="desc">Instructional locator map showing Mesoamerica and the Andes with the Mexica and Inca regions.</desc>
<rect width="1200" height="720" fill="#f5f0e7"/>
<rect x="45" y="45" width="1110" height="630" rx="18" fill="#fffdf7" stroke="#5a5f5c" stroke-width="3"/>
<text x="600" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="34" font-weight="700" fill="#1a1c1d">State Building in the Americas, c. 1200–1450</text>
<text x="600" y="124" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5a5f5c">Mexica / Aztec Empire in Mesoamerica and Inca Empire in the Andes</text>
<path d="M315 140 C380 175 410 235 390 300 C365 375 370 445 430 515 C355 505 305 455 280 390 C250 310 260 220 315 140 Z" fill="#d2b48c" stroke="#8c5a2b" stroke-width="3"/>
<path d="M545 190 C590 230 585 305 565 365 C540 440 545 515 595 615 C520 585 485 520 485 430 C485 335 500 250 545 190 Z" fill="#c9a46a" stroke="#8c5a2b" stroke-width="3"/>
<ellipse cx="345" cy="330" rx="78" ry="56" fill="#a8652d" opacity=".65" stroke="#6b3e1f" stroke-width="3"/>
<ellipse cx="535" cy="470" rx="55" ry="168" fill="#a8652d" opacity=".65" stroke="#6b3e1f" stroke-width="3"/>
<circle cx="350" cy="330" r="11" fill="#1a1c1d"/><text x="350" y="306" text-anchor="middle" font-family="Arial" font-size="22" font-weight="700">Tenochtitlan</text>
<circle cx="535" cy="490" r="11" fill="#1a1c1d"/><text x="535" y="515" text-anchor="middle" font-family="Arial" font-size="22" font-weight="700">Cusco</text>
<text x="345" y="405" text-anchor="middle" font-family="Arial" font-size="26" font-weight="700" fill="#6b3e1f">Mexica</text>
<text x="610" y="470" text-anchor="start" font-family="Arial" font-size="26" font-weight="700" fill="#6b3e1f">Inca</text>
<text x="760" y="285" font-family="Arial" font-size="21" fill="#1a1c1d">Mesoamerica: tribute, chinampas, warfare, religion</text>
<text x="760" y="340" font-family="Arial" font-size="21" fill="#1a1c1d">Andes: roads, mit'a labor, quipu, storehouses</text>
<line x1="720" y1="292" x2="430" y2="345" stroke="#5a5f5c" stroke-width="3"/>
<line x1="720" y1="346" x2="590" y2="485" stroke="#5a5f5c" stroke-width="3"/>
<g transform="translate(84 594)"><rect width="420" height="48" rx="8" fill="#1a1c1d"/><text x="18" y="31" font-family="Arial" font-size="18" fill="#f5f0e7">Locator map for comparison of American state systems</text></g>
</svg>