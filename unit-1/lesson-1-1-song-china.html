<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BeHistorical | AP World 1.1 Song China</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;800;900&family=Libre+Baskerville:wght@400;700&family=Montserrat:wght@500;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/behistorical.css" />
  <style>
    /* BeHistorical globe O enhancement: same footprint, dark meridian detail only */
    .logo-title .globe-o{
      display:inline-block;
      position:relative;
      vertical-align:.005em;
      width:.63em;
      height:.63em;
      margin:0 .01em 0 .035em !important;
      transform:translateX(.035em) !important;
      border:.075em solid currentColor;
      border-radius:50%;
      overflow:hidden;
      background:
        radial-gradient(ellipse at 28% 22%, rgba(255,255,255,.62) 0%, rgba(255,255,255,.32) 17%, transparent 36%),
        linear-gradient(135deg, #d8c18e 0%, #c9a46a 28%, #8c5a2b 68%, #34251c 100%);
      box-shadow:inset -.08em -.08em .16em rgba(0,0,0,.35), inset .05em .05em .1em rgba(255,255,255,.35);
    }
    .logo-title .globe-o span{position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); pointer-events:none; border-color:rgba(26,28,29,.7)}
    .logo-title .globe-o .lat,
    .logo-title .globe-o .lat-1,
    .logo-title .globe-o .lat-2,
    .logo-title .globe-o .lat-3{display:none !important;}
    .logo-title .globe-o .meridian{height:105%; border-left:.035em solid rgba(26,28,29,.55); border-right:.035em solid rgba(26,28,29,.55); border-radius:50%;}
    .logo-title .globe-o .mer-1{width:28%;}
    .logo-title .globe-o .mer-2{width:54%; border-left-width:.025em; border-right-width:.025em; opacity:.72;}
    .logo-title .globe-o .mer-3{width:78%; border-left-width:.02em; border-right-width:.02em; opacity:.55;}
    .logo-title .globe-o .prime{height:106%; border-left:.055em solid rgba(26,28,29,.78); width:0;}
    .logo-title .globe-o .shine{width:42%; height:24%; background:rgba(255,255,255,.42); border-radius:50%; left:32%; top:27%; transform:translate(-50%,-50%) rotate(-22deg); filter:blur(.01em);}
    .checkpoint-grid{display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:18px; margin:18px 0;}
    .checkpoint-focus{background:#f6efe3; color:var(--ink); border-left:5px solid var(--aged-iron); padding:14px 16px; border-radius:12px;}
    .checkpoint-focus h4{margin:0 0 8px; font-family:"Montserrat", Inter, Arial, sans-serif; text-transform:uppercase; letter-spacing:.08em; color:var(--oxidized-brown)}
    @media(max-width:820px){.checkpoint-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="site-shell">
    <header class="topbar">
      <nav class="nav">
        <a class="brand-mini" href="#top"><img src="../assets/logos/behistorical-logo.jpeg" alt="BeHistorical logo"><span>BeHistorical</span></a>
        <div class="nav-links">
          <a href="#targets">Targets</a><a href="#map">Map</a><a href="#first10">First &amp; 10</a><a href="#lecture">Lecture</a><a href="#checkpoint-one">Checkpoint 1</a><a href="#evidence">Evidence Lab</a><a href="#checkpoint-two">Checkpoint 2</a>
        </div>
      </nav>
    </header>

    <section class="hero" id="top">
      <div class="logo-frame"><img src="../assets/logos/behistorical-logo.jpeg" alt="BeHistorical logo"></div>
      <h1 class="logo-title" aria-label="BeHistorical">Be<span class="hero-h">H</span>ist<span class="globe-o" aria-label="o as globe"><span class="shine"></span><span class="lat lat-2"></span><span class="lat lat-1"></span><span class="lat lat-3"></span><span class="lat"></span><span class="meridian mer-3"></span><span class="meridian mer-2"></span><span class="meridian mer-1"></span><span class="prime"></span></span>rical</h1>
      <p class="subtitle">AP WORLD HISTORY</p>
      <p class="hero-copy"><strong id="lesson-title">Topic 1.1 — Song China</strong><br><span id="lesson-subtitle">Developments in East Asia, c. 1200 to c. 1450</span></p>
      <div class="quick-nav"><a class="btn" href="#targets">Learning Targets</a><a class="btn secondary" href="#map">Start with the Map</a><a class="btn secondary" href="#first10">First &amp; 10</a></div>
    </section>

    <main>
      <section class="section" id="targets"></section>
      <section class="section" id="framework"></section>
      <section class="section" id="map"></section>
      <section class="section" id="first10"></section>
      <section class="section dark-panel" id="lecture"></section>
      <section class="section" id="checkpoint-one"></section>
      <section class="section" id="evidence"></section>
      <section class="section" id="primary-source"></section>
      <section class="section" id="checkpoint-two"></section>
    </main>

    <footer class="footer"><div class="footer-brand">BeHistorical</div><p>Think Like a Historian.</p></footer>
  </div>

  <div class="lightbox" id="lightbox" aria-modal="true" role="dialog"><button class="btn" onclick="closeLightbox()">Close</button><figure><img id="lightbox-img" alt=""><figcaption id="lightbox-caption"></figcaption></figure></div>
  <div class="lecture-modal" id="lecture-modal" aria-modal="true" role="dialog" aria-labelledby="lecture-modal-title">
    <div class="lecture-modal-panel">
      <button class="btn lecture-close" onclick="closeLectureModal()">Close</button>
      <div class="lecture-modal-grid">
        <div class="lecture-modal-content">
          <div class="eyebrow">Lecture Focus</div>
          <h2 id="lecture-modal-title"></h2>
          <ul class="lecture-list enlarged" id="lecture-modal-bullets"></ul>
        </div>
        <figure class="lecture-modal-image-wrap">
          <img id="lecture-modal-img" alt="">
          <figcaption id="lecture-modal-caption"></figcaption>
        </figure>
      </div>
    </div>
  </div>

  <script src="../assets/data/lesson-1-1-song-china.js"></script>
  <script>
    const L = window.BEHISTORICAL_LESSON;
    const byId = id => document.getElementById(id);
    const md = s => String(s || '').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');

    const CHECKPOINT_ONE = {
      title: 'Checkpoint 1: Systems of Power and Belief',
      subtitle: 'This checkpoint connects Learning Targets 1 and 2.',
      prompt: 'Explain how Song China used government institutions and belief systems to maintain order and strengthen state power.',
      responseType: 'Checkpoint 1',
      terms: ['bureaucracy','civil service exams','scholar-officials','Confucianism','Neo-Confucianism','Mandate of Heaven'],
      focus: [
        'Government institutions: bureaucracy, civil service exams, scholar-officials',
        'Belief systems: Confucianism, Neo-Confucianism, Mandate of Heaven',
        'Historical reasoning: explain how institutions and beliefs helped maintain order and power'
      ]
    };

    const CHECKPOINT_TWO = {
      title: 'Checkpoint 2: Economy, Innovation, and Prosperity',
      subtitle: 'This checkpoint connects Learning Target 3.',
      prompt: 'Explain how two economic or technological developments helped Song China become one of the most prosperous societies in the world.',
      responseType: 'Checkpoint 2',
      terms: ['Champa rice','Grand Canal','paper money','printing','commercialization','urbanization','porcelain','iron and steel'],
      focus: [
        'Agriculture and population: Champa rice, food production, population growth',
        'Infrastructure and commerce: Grand Canal, paper money, cities, trade',
        'Historical reasoning: connect specific developments to prosperity, state power, or urban growth'
      ]
    };

    byId('lesson-title').textContent = `${L.meta.topic} — ${L.meta.title}`;
    byId('lesson-subtitle').textContent = L.meta.subtitle;

    byId('targets').innerHTML = `
      <div class="section-header"><div class="eyebrow">Learning Focus</div><h2>Learning Targets &amp; Success Criteria</h2><p>Use these to track what you should understand and be able to explain by the end of the topic.</p></div>
      <div class="target-success-grid">
        <article class="card target-card"><h3>Learning Targets</h3>${L.learningTargets.map((t,i)=>`<div class="target-item"><span class="target-number">${i+1}</span><p>${t.target}</p><span class="target-kc">${t.kc}</span></div>`).join('')}</article>
        <article class="card success-card"><h3>Success Criteria</h3>${L.successCriteria.map((c,i)=>`<div class="target-item"><span class="target-number">${i+1}</span><p>${c.criteria}</p><span class="target-kc">${c.kc}</span></div>`).join('')}</article>
      </div>`;

    byId('framework').innerHTML = `
      <details open><summary>College Board Framework Anchor</summary>
        <div class="framework">${L.framework.map(k => `<div class="kc"><span class="kc-code">${k.code}</span><br>${k.text}</div>`).join('')}</div>
      </details>`;

    byId('map').innerHTML = `
      <div class="section-header"><div class="eyebrow">Geography Check</div><h2>${L.map.title}</h2><p>${L.map.intro}</p></div>
      <article class="card map-card">
        <div class="map-grid">
          <figure class="map-figure">
            <img src="${L.map.url}" alt="${L.map.title}" onclick="openMapLightbox()">
            <figcaption><strong>${L.map.caption}</strong><br><a class="source-link" href="${L.map.sourceUrl}" target="_blank" rel="noopener">Open map source</a></figcaption>
          </figure>
          <div class="map-notes">
            <h3>Why this map matters</h3>
            <ul>${L.map.notes.map(n=>`<li>${md(n)}</li>`).join('')}</ul>
            <div class="question"><strong>Map Question</strong><br>${L.map.prompt}</div>
            ${draftBlock('map-check-response', L.map.prompt, 'Map Check')}
          </div>
        </div>
      </article>`;

    byId('first10').innerHTML = `
      <div class="section-header"><div class="eyebrow">Start Here</div><h2>${L.first10.title}</h2></div>
      <div class="card reading">${L.first10.paragraphs.map(p => `<p>${p}</p>`).join('')}</div>
      <div class="card"><h3>First &amp; 10 Response Questions</h3>${L.first10.questions.map((q,i)=>`<div class="question"><strong>Question ${i+1}</strong><br>${q}</div>`).join('')}</div>
      ${draftBlock('first10-response', L.first10.questions.join(' '), 'First and 10')}`;

    byId('lecture').innerHTML = `
      <div class="section-header"><div class="eyebrow">Content Delivery</div><h2>${L.lecture.title}</h2><p>${L.lecture.intro}</p></div>
      <div class="lecture-card-grid">${L.lecture.segments.map((seg,i) => `<article class="card dark-card lecture-topic-card" role="button" tabindex="0" aria-label="${seg.title}" onclick="openLectureModal(${i})" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();openLectureModal(${i})}"><h3>${seg.title}</h3><ul class="lecture-list">${seg.bullets.map(b=>`<li>${md(b)}</li>`).join('')}</ul></article>`).join('')}</div>
      ${L.lecture.videos.map(v => `<article class="card video-card"><h3>Video Clip</h3><div class="media-card"><div class="thumb video-thumb" style="${v.youtubeId ? `background-image:linear-gradient(rgba(26,28,29,.25),rgba(26,28,29,.55)),url('https://img.youtube.com/vi/${v.youtubeId}/hqdefault.jpg')` : ''}"><span>Video Clip</span></div><p><strong>${v.title}</strong></p><p>${v.prompt}</p><a class="btn" href="${v.url}" target="_blank" rel="noopener">Open Video</a></div></article>`).join('')}`;

    byId('checkpoint-one').innerHTML = renderCheckpoint(CHECKPOINT_ONE, 'checkpoint-one-response');

    byId('evidence').innerHTML = `
      <div class="section-header"><div class="eyebrow">Evidence Lab</div><h2>${L.evidenceLab.title}</h2><p>${L.evidenceLab.task}</p></div>
      <div class="grid">${L.images.map((img,i)=>`<article class="card image-card half"><img src="${img.url}" alt="${img.title}" onclick="openLightbox('${i}')"><div class="image-caption"><strong>${img.title}</strong><br>${img.caption}<br><em>${img.prompt}</em><br><a class="source-link" href="${img.url}" target="_blank" rel="noopener">Open source/image</a></div></article>`).join('')}</div>
      ${draftBlock('evidence-response', L.evidenceLab.prompt, 'Evidence Lab')}`;

    byId('primary-source').innerHTML = `
      <div class="section-header"><div class="eyebrow">Primary Source</div><h2>${L.primarySource.title}</h2></div>
      <div class="grid"><article class="card two-third"><p>${L.primarySource.intro}</p><blockquote>${L.primarySource.text}</blockquote></article><aside class="card third"><h3>Discussion Questions</h3>${L.primarySource.questions.map((q,i)=>`<div class="question"><strong>${i+1}</strong><br>${q}</div>`).join('')}</aside></div>
      ${draftBlock('primary-source-response', L.primarySource.questions.join(' '), 'Primary Source')}`;

    byId('checkpoint-two').innerHTML = renderCheckpoint(CHECKPOINT_TWO, 'checkpoint-two-response');

    function renderCheckpoint(cp, id){
      return `<div class="section-header"><div class="eyebrow">AP Checkpoint</div><h2>${cp.title}</h2><p>${cp.subtitle}</p></div>
      <div class="checkpoint-grid"><article class="checkpoint-focus"><h4>Focus Terms</h4><p>${cp.terms.map(t=>`<strong>${t}</strong>`).join(', ')}</p></article><article class="checkpoint-focus"><h4>What this checks</h4><ul>${cp.focus.map(f=>`<li>${f}</li>`).join('')}</ul></article></div>
      ${responseBlock(id, cp.prompt, cp.responseType, cp.terms)}`;
    }

    const responseFormConfig = {
      formBaseUrl: "https://docs.google.com/forms/d/e/1FAIpQLSfBMy2v9tjXnA9aWZLwBjMdl-snJc2RWljKUxgRwUNxYQPq_g/viewform",
      entries: {
        studentName: "entry.1203454783",
        classPeriod: "entry.1732954465",
        responseType: "entry.1335443862",
        studentResponse: "entry.1590650308",
        revisionNotes: "entry.1271515630",
        confidenceLevel: "entry.1366844489"
      }
    };

    function draftBlock(id, prompt, responseType){
      return `<div class="prompt-box"><h3>Draft Your Thinking</h3><p>${prompt}</p><textarea class="response-area" id="${id}" data-response-type="${responseType}" placeholder="Type your response here..."></textarea><div class="tool-row"><button class="btn" type="button" onclick="saveDraft('${id}')">Save Draft</button><button class="btn secondary" type="button" onclick="copyResponse('${id}')">Copy Response</button></div><div id="${id}-result" class="check-result"></div></div>`;
    }

    function responseBlock(id, prompt, responseType, terms=[]){
      return `<div class="prompt-box"><h3>Submit Your Checkpoint</h3><p>${prompt}</p><textarea class="response-area" id="${id}" data-response-type="${responseType}" data-terms="${terms.join('|')}" placeholder="Type your checkpoint response here..."></textarea><div class="tool-row"><button class="btn" type="button" onclick="saveDraft('${id}')">Save Draft</button><button class="btn secondary" type="button" onclick="copyResponse('${id}')">Copy Response</button><button class="btn" type="button" onclick="sendToGoogleForm('${id}')">Send to Response Form</button><button class="btn secondary" type="button" onclick="selfCheck('${id}')">Run Self-Check</button><a class="btn secondary" href="${L.meta.feedbackToolUrl}" target="_blank" rel="noopener">Open MagicSchool</a></div><div id="${id}-result" class="check-result"></div></div>`;
    }

    function saveDraft(id){
      const t=byId(id); if(!t) return;
      localStorage.setItem(`behistorical-draft-${id}`, t.value || '');
      byId(id+'-result').textContent='Draft saved on this device.';
    }
    function loadDraft(id){
      const t=byId(id); if(!t) return;
      const saved=localStorage.getItem(`behistorical-draft-${id}`); if(saved){ t.value=saved; }
    }
    function loadAllDrafts(){ document.querySelectorAll('textarea.response-area').forEach(t=>loadDraft(t.id)); }
    function copyResponse(id){
      const t=byId(id); if(!t) return;
      navigator.clipboard.writeText(t.value || '').then(()=>{byId(id+'-result').textContent='Response copied.'}).catch(()=>{byId(id+'-result').textContent='Copy failed. Select your text and copy manually.'});
    }
    function getStudentInfo(){
      let studentName=localStorage.getItem('behistorical-student-name') || '';
      let classPeriod=localStorage.getItem('behistorical-class-period') || '';
      if(!studentName){ studentName=prompt('Enter your name:') || ''; }
      if(!studentName.trim()) return null;
      if(!classPeriod){ classPeriod=prompt('Enter your class period exactly as it appears in the form, such as Silver 1:') || ''; }
      if(!classPeriod.trim()) return null;
      localStorage.setItem('behistorical-student-name', studentName.trim());
      localStorage.setItem('behistorical-class-period', classPeriod.trim());
      return {studentName: studentName.trim(), classPeriod: classPeriod.trim()};
    }
    function sendToGoogleForm(id){
      const t=byId(id); if(!t) return;
      const studentResponse=(t.value || '').trim();
      if(!studentResponse){ byId(id+'-result').textContent='Write a response before sending it to the form.'; return; }
      const info=getStudentInfo(); if(!info) return;
      const responseType=t.dataset.responseType || 'Checkpoint';
      const confidenceLevel=prompt('Confidence level? Enter a number from 1 to 5:', '4') || '4';
      const params=new URLSearchParams();
      params.set('usp','pp_url');
      params.set(responseFormConfig.entries.studentName, info.studentName);
      params.set(responseFormConfig.entries.classPeriod, info.classPeriod);
      params.set(responseFormConfig.entries.responseType, responseType);
      params.set(responseFormConfig.entries.studentResponse, studentResponse);
      params.set(responseFormConfig.entries.revisionNotes, '');
      params.set(responseFormConfig.entries.confidenceLevel, confidenceLevel);
      const formUrl=`${responseFormConfig.formBaseUrl}?${params.toString()}`;
      window.open(formUrl,'_blank');
      byId(id+'-result').textContent='Response sent to the form preview. Review it and click Submit in Google Forms.';
    }
    function selfCheck(id){
      const t=byId(id); if(!t) return;
      const text=(t.value||'').toLowerCase();
      const terms=(t.dataset.terms||'').split('|').filter(Boolean);
      const found=terms.filter(term=>text.includes(term.toLowerCase()));
      const reasoning=['because','therefore','as a result','led to','caused','helped','strengthened','maintained','contributed'].filter(w=>text.includes(w));
      byId(id+'-result').textContent=`Self-check: ${text.split(/\s+/).filter(Boolean).length} words; evidence terms found: ${found.length ? found.join(', ') : 'none yet'}; reasoning language: ${reasoning.length ? reasoning.join(', ') : 'none yet'}.`;
    }
    function openLightbox(i){const img=L.images[i];byId('lightbox-img').src=img.url;byId('lightbox-img').alt=img.title;byId('lightbox-caption').textContent=`${img.title} — ${img.caption}`;byId('lightbox').classList.add('show')}
    function openMapLightbox(){const img=L.map;byId('lightbox-img').src=img.url;byId('lightbox-img').alt=img.title;byId('lightbox-caption').textContent=`${img.title} — ${img.caption}`;byId('lightbox').classList.add('show')}
    function closeLightbox(){byId('lightbox').classList.remove('show')}
    function openLectureModal(i){
      const seg=L.lecture.segments[i];
      byId('lecture-modal-title').textContent=seg.title;
      byId('lecture-modal-bullets').innerHTML=seg.bullets.map(b=>`<li>${md(b)}</li>`).join('');
      byId('lecture-modal-img').src=seg.image.url;
      byId('lecture-modal-img').alt=seg.image.title;
      byId('lecture-modal-caption').innerHTML=`<strong>${seg.image.title}</strong><br>${seg.image.caption}<br><a href="${seg.image.sourceUrl || seg.image.url}" target="_blank" rel="noopener">Open image source</a>`;
      byId('lecture-modal').classList.add('show');
    }
    function closeLectureModal(){byId('lecture-modal').classList.remove('show')}
    document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeLightbox();closeLectureModal()}});
    loadAllDrafts();
  </script>
</body>
</html>
