<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>First &amp; 10 Capture Wrapper | Topic 1.1 Song China</title>
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #1A1C1D; overflow: hidden; }
    iframe { width: 100%; height: 100vh; border: 0; display: block; }
  </style>
</head>
<body>
  <iframe id="first10-frame" src="first-and-10-topic-1-1-song-china.html?v=response-builder-v10" title="First and 10 Topic 1.1 Song China"></iframe>
  <script>
    const PREFILLED_FIRST10_FORM = 'https://docs.google.com/forms/d/e/1FAIpQLSe_0wBPNvSivuE0ea3fhty43c4PDNfE-tEWsGsZYyh0gFCxxw/viewform?usp=pp_url&entry.125385659=Unit+1+-+The+Global+Tapestry&entry.187055090=1.1+-+Song+China&entry.1549761827=1.1-first10&entry.2107637366=First+and+10';

    function openPrefilledFirst10Form(childWindow, childDocument) {
      const output = childDocument.getElementById('google-output');
      const content = output ? output.value : '';
      if (content && childWindow.navigator && childWindow.navigator.clipboard) {
        childWindow.navigator.clipboard.writeText(content).catch(() => {});
      }
      childWindow.open(PREFILLED_FIRST10_FORM, '_blank');
    }

    function wireFirst10Capture() {
      const frame = document.getElementById('first10-frame');
      try {
        const childWindow = frame.contentWindow;
        const childDocument = frame.contentDocument || childWindow.document;
        if (!childWindow || !childDocument) return;

        childWindow.submitToGoogleForm = function() {
          openPrefilledFirst10Form(childWindow, childDocument);
        };

        const buttons = Array.from(childDocument.querySelectorAll('button'));
        buttons.forEach(button => {
          const label = (button.textContent || '').trim().toLowerCase();
          if (label === 'submit to google form') {
            button.onclick = null;
            button.addEventListener('click', event => {
              event.preventDefault();
              event.stopPropagation();
              openPrefilledFirst10Form(childWindow, childDocument);
            });
          }
        });
      } catch (error) {
        console.warn('Unable to wire First & 10 capture link:', error);
      }
    }

    document.getElementById('first10-frame').addEventListener('load', wireFirst10Capture);
  </script>
</body>
</html>
